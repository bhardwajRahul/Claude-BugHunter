      <text x="18" y="28" font-size="18" font-weight="700" fill="#ffffff">XSS · IDOR · SQLi</text>
      <text x="372" y="28" text-anchor="end" font-size="11" font-family="ui-monospace, monospace" fill="#5a5a6a">HW-01</text>
      <text x="18" y="52" font-size="13" fill="#7a7a8a">174 · 26 · 8 reports · stored, reflected, DOM</text>
