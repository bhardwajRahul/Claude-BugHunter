      <rect width="390" height="68" fill="#14141a" stroke="#2a2a35" stroke-width="1"/>
      <text x="18" y="28" font-size="18" font-weight="700" fill="#ffffff">Business logic</text>
      <text x="372" y="28" text-anchor="end" font-size="11" font-family="ui-monospace, monospace" fill="#5a5a6a">HW-03</text>
      <text x="18" y="52" font-size="13" fill="#7a7a8a">7 reports · race · double-spend</text>
