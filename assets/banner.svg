      <text x="372" y="28" text-anchor="end" font-size="11" font-family="ui-monospace, monospace" fill="#5a5a6a">AP-02</text>
      <text x="18" y="52" font-size="13" fill="#7a7a8a">11 reports · 27 takeover fingerprints</text>
    </g>
    <g transform="translate(1410, 458)">
      <rect width="390" height="68" fill="#14141a" stroke="#2a2a35" stroke-width="1"/>
      <text x="18" y="28" font-size="18" font-weight="700" fill="#ffffff">HTTP smuggling · cache</text>
      <text x="372" y="28" text-anchor="end" font-size="11" font-family="ui-monospace, monospace" fill="#5a5a6a">AD-02</text>
      <text x="18" y="52" font-size="13" fill="#7a7a8a">CL.TE · TE.CL · H2.CL · CDN poison</text>
