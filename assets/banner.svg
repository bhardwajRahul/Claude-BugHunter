    <text x="660" y="6" font-size="14" fill="#ff2d4f">▸</text>

    <g transform="translate(680, -14)">
      <rect width="280" height="32" fill="none" stroke="#ff2d4f" stroke-width="1.5"/>
      <text x="14" y="20" font-size="13" fill="#ffffff" letter-spacing="2"><tspan fill="#ff2d4f">03</tspan>  HUNT</text>
      <text x="266" y="20" text-anchor="end" font-size="11" fill="#ff2d4f" font-weight="600">active</text>
    </g>
    <text x="970" y="6" font-size="14" fill="#ff2d4f">▸</text>

    <g transform="translate(990, -14)">
      <rect width="280" height="32" fill="none" stroke="#2a2a35" stroke-width="1"/>
      <text x="14" y="20" font-size="13" fill="#ffffff" letter-spacing="2"><tspan fill="#ff2d4f">04</tspan>  VALIDATE</text>
