<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 720" width="1920" height="720" role="img" aria-label="Claude-BugHunter — Bug Hunting Arsenal for Claude Code">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a0e"/>
      <stop offset="100%" stop-color="#101018"/>
    </linearGradient>
    <radialGradient id="logo-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff2d4f" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#ff2d4f" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1a1a26" stroke-width="0.5"/>
    </pattern>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1920" height="720" fill="url(#bg)"/>
  <rect width="1920" height="720" fill="url(#grid)"/>

  <!-- Corner brackets -->
  <g stroke="#ff2d4f" stroke-width="2" fill="none">
    <path d="M 40 30 L 20 30 L 20 50"/>
    <path d="M 1880 30 L 1900 30 L 1900 50"/>
    <path d="M 40 690 L 20 690 L 20 670"/>
    <path d="M 1880 690 L 1900 690 L 1900 670"/>
  </g>

  <!-- Top header bar -->
  <g font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="13" fill="#5a5a6a" letter-spacing="1.5">
    <text x="60" y="58">▸ N 00°00'00" · SECTOR-A</text>
    <text x="780" y="58">· BUILD:STABLE · SHA:b48c833 · 574+ DISCLOSED REPORTS ·</text>
    <text x="1860" y="58" text-anchor="end">SYS://HUNT.LIVE · 0xC0DE</text>
  </g>

  <!-- Logo dot -->
  <g transform="translate(120, 165)">
    <circle cx="0" cy="0" r="42" fill="url(#logo-glow)"/>
    <g stroke="#ff2d4f" stroke-width="2.5" fill="none" filter="url(#glow)">
      <circle cx="0" cy="0" r="14"/>
      <line x1="-22" y1="0" x2="-30" y2="0"/>
      <line x1="22" y1="0" x2="30" y2="0"/>
      <line x1="0" y1="-22" x2="0" y2="-30"/>
      <line x1="0" y1="22" x2="0" y2="30"/>
      <line x1="15.5" y1="15.5" x2="22" y2="22"/>
      <line x1="-15.5" y1="15.5" x2="-22" y2="22"/>
      <line x1="15.5" y1="-15.5" x2="22" y2="-22"/>
      <line x1="-15.5" y1="-15.5" x2="-22" y2="-22"/>
    </g>
    <circle cx="0" cy="0" r="4" fill="#ff2d4f" filter="url(#glow)"/>
  </g>

  <!-- Title -->
  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
    <text x="200" y="190" font-size="92" font-weight="800" fill="#ffffff" letter-spacing="-3">claude</text>
    <text x="448" y="190" font-size="92" font-weight="300" fill="#5a5a6a">/</text>
    <text x="492" y="190" font-size="92" font-weight="800" fill="#ff2d4f" letter-spacing="-3" filter="url(#glow)">bughunter</text>
    <line x1="492" y1="208" x2="980" y2="208" stroke="#ff2d4f" stroke-width="3"/>
  </g>

  <!-- Subtitle -->
  <g transform="translate(200, 240)" font-family="ui-monospace, 'SF Mono', Menlo, monospace">
    <circle cx="-2" cy="-4" r="5" fill="#ff2d4f" filter="url(#glow)"/>
    <text x="14" y="0" font-size="16" fill="#b8b8c0" letter-spacing="3">BUG HUNTING ARSENAL · DISCLOSED-REPORT TRADECRAFT</text>
