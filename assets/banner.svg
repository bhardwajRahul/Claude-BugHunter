      <text x="18" y="52" font-size="13" fill="#7a7a8a">67 reports · 8 engines · OOB exfil</text>
    </g>

    <!-- Row 2 cards -->
    <g transform="translate(60, 458)">
      <rect width="390" height="68" fill="#14141a" stroke="#2a2a35" stroke-width="1"/>
      <text x="18" y="28" font-size="18" font-weight="700" fill="#ffffff">CSRF · file-upload</text>
      <text x="372" y="28" text-anchor="end" font-size="11" font-family="ui-monospace, monospace" fill="#5a5a6a">HW-02</text>
      <text x="18" y="52" font-size="13" fill="#7a7a8a">10 reports · 10 upload-bypass tables</text>
    </g>
    <g transform="translate(510, 458)">
      <rect width="390" height="68" fill="#14141a" stroke="#2a2a35" stroke-width="1"/>
      <text x="18" y="28" font-size="18" font-weight="700" fill="#ffffff">MFA-bypass · auth-bypass</text>
      <text x="372" y="28" text-anchor="end" font-size="11" font-family="ui-monospace, monospace" fill="#5a5a6a">AU-02</text>
      <text x="18" y="52" font-size="13" fill="#7a7a8a">7 patterns · OTP brute · session race</text>
    </g>
    <g transform="translate(960, 458)">
      <rect width="390" height="68" fill="#14141a" stroke="#2a2a35" stroke-width="1"/>
