    <text x="240" y="0" text-anchor="end" fill="#ffffff">v1.0 · MIT</text>
    <text x="0" y="22" fill="#5a5a6a">AUTHOR</text>
    <text x="240" y="22" text-anchor="end" fill="#ffffff">@elementalsouls</text>
    <text x="0" y="44" fill="#5a5a6a">REPO</text>
    <text x="240" y="44" text-anchor="end" fill="#ffffff">github.com/elementalsouls/Claude-BugHunter</text>
  </g>

  <!-- Section header: HUNT ARSENAL -->
  <g transform="translate(60, 305)">
    <rect x="0" y="-14" width="3" height="20" fill="#ff2d4f"/>
    <text x="14" y="0" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="14" fill="#ff2d4f" letter-spacing="4" font-weight="700">HUNT ARSENAL</text>
    <text x="200" y="0" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="13" fill="#5a5a6a" letter-spacing="2">// 24 CLASSES</text>
    <text x="360" y="0" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="13" fill="#5a5a6a" letter-spacing="2">// 574+ REPORTS</text>
    <text x="540" y="0" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="13" fill="#5a5a6a" letter-spacing="2">// 6 PHASES</text>
    <text x="1860" y="0" text-anchor="end" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="13" fill="#5a5a6a" letter-spacing="2">0X01 · TRIAGE · VALIDATE · CHAIN · REPORT</text>
