    <g transform="translate(510, 380)">
      <rect width="390" height="68" fill="#14141a" stroke="#ff2d4f" stroke-width="1" stroke-opacity="0.3"/>
      <text x="18" y="28" font-size="18" font-weight="700" fill="#ffffff">OAuth · SAML · ATO</text>
      <text x="372" y="28" text-anchor="end" font-size="11" font-family="ui-monospace, monospace" fill="#5a5a6a">AU-01</text>
      <text x="18" y="52" font-size="13" fill="#7a7a8a">10 reports · 8 XSW patterns · 9 ATO paths</text>
    </g>
    <g transform="translate(960, 380)">
      <rect width="390" height="68" fill="#14141a" stroke="#ff2d4f" stroke-width="1" stroke-opacity="0.3"/>
      <text x="18" y="28" font-size="18" font-weight="700" fill="#ffffff">SSRF · GraphQL · API</text>
      <text x="372" y="28" text-anchor="end" font-size="11" font-family="ui-monospace, monospace" fill="#5a5a6a">AP-01</text>
      <text x="18" y="52" font-size="13" fill="#7a7a8a">11 IP-bypass · introspection · mass-assign</text>
    </g>
    <g transform="translate(1410, 380)">
      <rect width="390" height="68" fill="#14141a" stroke="#ff2d4f" stroke-width="1" stroke-opacity="0.3"/>
      <text x="18" y="28" font-size="18" font-weight="700" fill="#ffffff">RCE · SSTI · XXE</text>
