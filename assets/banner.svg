      <text x="14" y="20" font-size="13" fill="#ffffff" letter-spacing="2"><tspan fill="#ff2d4f">02</tspan>  RECON</text>
      <text x="266" y="20" text-anchor="end" font-size="11" fill="#5a5a6a">passive</text>
