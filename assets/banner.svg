      <text x="18" y="28" font-size="18" font-weight="700" fill="#ffffff">Race · misc · reporting</text>
      <text x="372" y="28" text-anchor="end" font-size="11" font-family="ui-monospace, monospace" fill="#5a5a6a">AD-03</text>
