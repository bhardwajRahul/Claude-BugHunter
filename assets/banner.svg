      <text x="372" y="28" text-anchor="end" font-size="11" font-family="ui-monospace, monospace" fill="#5a5a6a">AU-03</text>
      <text x="18" y="52" font-size="13" fill="#7a7a8a">prompt injection · ASCII smuggling · ASI01-10</text>
