    <text x="780" y="0" fill="#ff2d4f" font-weight="600">BUNDLED</text>
    <text x="900" y="0" fill="#5a5a6a">·</text>
    <text x="920" y="0" fill="#5a5a6a">PRODUCTION-READY</text>
    <text x="1110" y="0" fill="#5a5a6a">·</text>
    <text x="1130" y="0" fill="#5a5a6a">OFFENSIVE</text>
    <text x="1240" y="0" fill="#5a5a6a">·</text>
    <text x="1260" y="0" fill="#5a5a6a">DOCUMENTED</text>
    <text x="1860" y="0" text-anchor="end" fill="#ff2d4f" font-weight="600">SHIP IT ◂</text>
